<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Map — eGov DIGIT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── TOKENS — match microsite exactly ─────────────────── */
  :root {
    --bg:       #f7f4ef;
    --surface:  #ffffff;
    --surface2: #f0ede8;
    --text:     #1c1917;
    --muted:    #78716c;
    --faint:    #a8a29e;
    --border:   #e7e5e4;
    --green:    #2a6e47;
    --green-lt: #d1f0e2;
    --amber:    #b45309;
    --amber-lt: #fef3c7;

    /* Role colours */
    --c-egov:    #2a6e47;
    --c-comm:    #1e40af;
    --c-dev:     #b45309;
    --c-govt:    #6b21a8;
    --c-intl:    #0f766e;
    --c-pipe:    #c8c4be;

    /* Map fills */
    --f-egov:   #d1f0e2;
    --f-comm:   #dbeafe;
    --f-dev:    #fef3c7;
    --f-govt:   #f3e8ff;
    --f-pipe:   #ede9e4;
    --f-none:   #e8e4de;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2.5rem 2rem 4rem;
  }

  /* ── PAGE HEADER ────────────────────────────────────────── */
  .page-header { max-width: 1200px; margin: 0 auto 2.5rem; }
  .page-eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 0.55rem;
  }
  .page-eyebrow::before {
    content: '';
    display: block;
    width: 24px;
    height: 2px;
    background: var(--green);
    flex-shrink: 0;
  }
  .page-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.8rem, 3.5vw, 2.6rem);
    line-height: 1.15;
    color: var(--text);
    margin-bottom: 0.6rem;
  }
  .page-sub {
    font-size: 0.92rem;
    line-height: 1.7;
    color: var(--muted);
    max-width: 640px;
  }

  /* ── STAT ROW ───────────────────────────────────────────── */
  .stat-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    margin: 1.8rem 0;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.85rem 1.2rem;
    min-width: 110px;
  }
  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 1.7rem;
    color: var(--green);
    line-height: 1;
    margin-bottom: 0.2rem;
  }
  .stat-lbl {
    font-size: 0.7rem;
    color: var(--muted);
    line-height: 1.35;
  }

  /* ── FILTER PILLS ───────────────────────────────────────── */
  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;
    align-items: center;
    margin-bottom: 1.6rem;
  }
  .filter-lbl {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 0.2rem;
  }
  .fbtn {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.3rem 0.85rem;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: #57534e;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.35rem;
  }
  .fbtn:hover { border-color: var(--green); color: var(--green); }
  .fbtn.active { background: var(--green); color: white; border-color: var(--green); }
  .fbtn.f-comm.active  { background: var(--c-comm); border-color: var(--c-comm); }
  .fbtn.f-dev.active   { background: var(--c-dev);  border-color: var(--c-dev); }
  .fbtn.f-govt.active  { background: var(--c-govt); border-color: var(--c-govt); }
  .fbtn.f-pipe.active  { background: #78716c;       border-color: #78716c; }
  .fbtn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── LEGEND ─────────────────────────────────────────────── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: center;
    margin-bottom: 1.2rem;
    font-size: 0.72rem;
    color: #57534e;
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .ldot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .new-badge {
    font-size: 0.62rem;
    background: var(--amber-lt);
    color: #92400e;
    border: 1px solid #fde68a;
    border-radius: 4px;
    padding: 0.08rem 0.38rem;
    font-weight: 600;
  }

  /* ── MAP LAYOUT ─────────────────────────────────────────── */
  .map-layout {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 1.8rem;
    align-items: start;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ── MAP SVG ────────────────────────────────────────────── */
  .map-wrap {
    background: #d8eaf5;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid #b8d4e8;
    position: relative;
  }
  .map-hint {
    position: absolute;
    bottom: 0.8rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.68rem;
    background: rgba(255,255,255,0.85);
    border-radius: 20px;
    padding: 0.3rem 0.8rem;
    color: var(--muted);
    pointer-events: none;
    white-space: nowrap;
    border: 1px solid var(--border);
  }

  .map-state {
    transition: filter 0.15s, opacity 0.2s;
    cursor: pointer;
  }
  .map-state:hover { filter: brightness(0.88); }
  .map-state.selected { filter: brightness(0.82); stroke-width: 2 !important; }
  .map-state.dimmed  { opacity: 0.28; }
  .map-dot { cursor: pointer; }
  .map-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 6.5px;
    fill: #374151;
    font-weight: 600;
    pointer-events: none;
    user-select: none;
  }
  .map-label-sm { font-size: 5.5px; }
  .map-count-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 6px;
    font-weight: 500;
    fill: white;
    pointer-events: none;
    user-select: none;
  }

  /* ── SIDE PANEL ─────────────────────────────────────────── */
  .panel-col { min-height: 500px; }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem 1.6rem;
    position: sticky;
    top: 2rem;
  }
  .panel-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 320px;
    gap: 0.8rem;
    color: var(--muted);
    text-align: center;
  }
  .panel-empty-icon { font-size: 2.2rem; opacity: 0.5; }
  .panel-empty-text { font-size: 0.85rem; line-height: 1.6; max-width: 240px; }

  .panel-state-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: var(--text);
    margin-bottom: 0.35rem;
  }
  .panel-pills {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-bottom: 1.1rem;
  }
  .panel-pill {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 0.18rem 0.55rem;
    border-radius: 8px;
  }
  .pill-live   { background: #dcfce7; color: #15803d; }
  .pill-design { background: #fef9c3; color: #a16207; }

  .prog-list { display: flex; flex-direction: column; gap: 0.65rem; }
  .prog-card {
    background: var(--bg);
    border-radius: 9px;
    padding: 0.85rem 1rem;
    border-left: 3px solid var(--c-pipe);
    cursor: pointer;
    transition: background 0.12s, transform 0.12s;
  }
  .prog-card:hover { background: #f0f7f4; transform: translateX(2px); }
  .prog-card.c-egov_direct        { border-left-color: var(--c-egov); }
  .prog-card.c-commercial_partner { border-left-color: var(--c-comm); }
  .prog-card.c-development_sector { border-left-color: var(--c-dev); }
  .prog-card.c-govt_body          { border-left-color: var(--c-govt); }

  .prog-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.5rem;
    margin-bottom: 0.3rem;
  }
  .prog-use {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    flex: 1;
  }
  .prog-stage {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 0.15rem 0.45rem;
    border-radius: 7px;
    flex-shrink: 0;
  }
  .prog-meta {
    font-size: 0.73rem;
    color: var(--muted);
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    align-items: center;
    margin-bottom: 0.3rem;
  }
  .prog-sector {
    background: #f0efed;
    border-radius: 4px;
    padding: 0.1rem 0.4rem;
  }
  .prog-detail {
    display: none;
    font-size: 0.78rem;
    line-height: 1.65;
    color: #44403c;
    margin-top: 0.5rem;
    padding-top: 0.5rem;
    border-top: 1px solid var(--border);
  }
  .prog-detail.open { display: block; }
  .prog-detail-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.5rem;
  }
  .prog-dm {
    font-size: 0.68rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.12rem 0.4rem;
    color: #57534e;
  }
  .prog-dm strong { color: var(--text); }

  /* ── INTERNATIONAL INSET ────────────────────────────────── */
  .intl-wrap {
    max-width: 1200px;
    margin: 1.4rem auto 0;
  }
  .intl-toggle {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1.4rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .intl-toggle:hover { background: var(--surface2); }
  .intl-toggle.open { border-radius: 10px 10px 0 0; border-bottom-color: transparent; }
  .intl-left { display: flex; align-items: center; gap: 0.8rem; }
  .intl-icon { font-size: 1.25rem; }
  .intl-title { font-size: 0.88rem; font-weight: 700; color: var(--text); }
  .intl-sub { font-size: 0.73rem; color: var(--muted); }
  .intl-chevron { font-size: 0.75rem; color: var(--faint); transition: transform 0.2s; }
  .intl-toggle.open .intl-chevron { transform: rotate(180deg); }
  .intl-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 10px 10px;
    padding: 1.2rem 1.4rem;
  }
  .intl-panel.visible { display: block; }
  .intl-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.7rem;
  }
  .intl-card {
    background: var(--bg);
    border-radius: 8px;
    padding: 0.7rem 0.9rem;
    border-left: 2px solid var(--c-intl);
  }
  .intl-geo  { font-size: 0.77rem; font-weight: 700; color: var(--text); margin-bottom: 0.2rem; }
  .intl-use  { font-size: 0.75rem; color: #44403c; line-height: 1.35; margin-bottom: 0.2rem; }
  .intl-meta { font-size: 0.68rem; color: var(--muted); }

  /* ── LOADING ────────────────────────────────────────────── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 400px;
    gap: 0.8rem;
    color: var(--muted);
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RESPONSIVE ─────────────────────────────────────────── */
  @media(max-width: 900px) {
    .map-layout { grid-template-columns: 1fr; }
    .panel { position: static; }
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-eyebrow">Solutions built by the eGov community</div>
  <h1 class="page-title">Portfolio of programs.</h1>
  <p class="page-sub">Each of eGov's five modes of engagement leaves a different footprint. A portfolio of 70+ programmes has taken shape across 20+ states and 11 sectors. Most were not built by eGov. That is precisely the point.</p>
</div>

<div id="appRoot" style="max-width:1200px;margin:0 auto;">
  <div class="loading"><div class="spinner"></div><span style="font-size:.85rem;">Loading programme data…</span></div>
</div>

<script>
// ── CSV FETCH URL ─────────────────────────────────────────────────────────
// TO SWAP TO BAKED-IN DATA: replace this fetch block with:
//   const PROGRAMS = [ /* paste ECO_PROGRAMS array here */ ];
//   init(PROGRAMS);
const CSV_URL = 'https://raw.githubusercontent.com/kriticalthinking/digit-building-blocks-visualization/main/programmes.csv';

// ── ROLE CONFIG ───────────────────────────────────────────────────────────
const ROLE = {
  egov_direct:        { label:'eGov direct',        fill:'#d1f0e2', stroke:'#2a6e47', dot:'#2a6e47' },
  commercial_partner: { label:'Commercial partner',  fill:'#dbeafe', stroke:'#1e40af', dot:'#1e40af' },
  development_sector: { label:'Development sector',  fill:'#fef3c7', stroke:'#b45309', dot:'#b45309' },
  govt_body:          { label:'Govt / public body',  fill:'#f3e8ff', stroke:'#6b21a8', dot:'#6b21a8' },
  international:      { label:'International',       fill:'#ccfbf1', stroke:'#0f766e', dot:'#0f766e' },
  pipeline:           { label:'Pipeline',            fill:'#ede9e4', stroke:'#c8c4be', dot:'#a8a29e' },
};

// Map geography values in CSV → state IDs used in SVG
const GEO_SID = {
  'Andhra Pradesh':'ap','Assam':'as','Bihar':'br','Chandigarh':'ch',
  'Chhattisgarh':'cg','Goa':'ga','Gujarat':'gj','Haryana':'hr',
  'Himachal Pradesh':'hp','Jammu & Kashmir':'jk','Jharkhand':'jh',
  'Karnataka':'ka','Kerala':'kl','Ladakh':'la','Madhya Pradesh':'mp',
  'Maharashtra':'mh','Manipur':'mn','New Delhi':'dl','Odisha':'od',
  'Puducherry':'py','Punjab':'pb','Rajasthan':'rj','Tamil Nadu':'tn',
  'Telangana':'tg','Uttar Pradesh':'up','Uttarakhand':'uk',
  'West Bengal':'wb',
  // national / multi-state → special bucket
  'All Cantonments':'_nat','Central Govt.':'_nat','National (NUDM)':'_nat',
};

// ── CSV PARSER ────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].replace(/\r/,'').split(',').map(h => h.replace(/"/g,'').trim());
  return lines.slice(1).map(line => {
    // handle quoted fields with commas
    const vals = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h,i) => { obj[h] = vals[i] || ''; });
    return {
      geo:     obj.geography,
      sector:  obj.sector,
      use:     obj.use_case,
      by:      obj.implementing_partner,
      role:    obj.role,
      stage:   obj.stage,
      new:     obj.new_product === 'Yes',
      pop:     obj.population_impact ? Number(obj.population_impact) : null,
      year:    obj.year_initiated || null,
      details: obj.details,
    };
  }).filter(p => p.geo);
}

// ── BUILD STATE → PROGRAMS MAP ────────────────────────────────────────────
function buildStateMap(programs) {
  const m = {};
  programs.forEach(p => {
    const sid = GEO_SID[p.geo] || (p.role === 'international' ? '_intl' : '_unknown');
    if (!m[sid]) m[sid] = [];
    m[sid].push(p);
  });
  return m;
}

function dominantRole(progs) {
  const live = progs.filter(p => p.stage === 'Live');
  const src = live.length ? live : progs;
  const counts = {};
  src.forEach(p => { const r = p.role||'pipeline'; counts[r] = (counts[r]||0)+1; });
  return Object.entries(counts).sort((a,b) => b[1]-a[1])[0]?.[0] || 'pipeline';
}

// ── MAIN INIT ─────────────────────────────────────────────────────────────
let PROGRAMS = [];
let stateMap  = {};
let activeFilter = 'all';
let activeState  = null;
let expandedCard = null;

function init(programs) {
  PROGRAMS = programs;
  stateMap  = buildStateMap(programs);
  renderApp();
}

function renderApp() {
  const root = document.getElementById('appRoot');
  root.innerHTML = `
    <div id="statRow" class="stat-row"></div>
    <div class="filter-row">
      <span class="filter-lbl">Filter by:</span>
      <button class="fbtn active" onclick="applyFilter('all',this)">All programmes</button>
      <button class="fbtn" onclick="applyFilter('egov_direct',this)"><span class="fbtn-dot" style="background:#2a6e47"></span>eGov direct</button>
      <button class="fbtn f-comm" onclick="applyFilter('commercial_partner',this)"><span class="fbtn-dot" style="background:#1e40af"></span>Commercial partners</button>
      <button class="fbtn f-dev" onclick="applyFilter('development_sector',this)"><span class="fbtn-dot" style="background:#b45309"></span>Development sector</button>
      <button class="fbtn f-govt" onclick="applyFilter('govt_body',this)"><span class="fbtn-dot" style="background:#6b21a8"></span>Govt / public body</button>
      <button class="fbtn f-pipe" onclick="applyFilter('pipeline',this)"><span class="fbtn-dot" style="background:#a8a29e"></span>Pipeline</button>
    </div>
    <div class="legend">
      ${Object.entries(ROLE).filter(([k])=>k!=='international').map(([k,v])=>
        `<div class="legend-item"><div class="ldot" style="background:${v.dot}"></div>${v.label}</div>`
      ).join('')}
      <div class="legend-item"><span class="new-badge">Net-new</span>&nbsp;New product built on DIGIT</div>
    </div>
    <div class="map-layout">
      <div>
        <div class="map-wrap">
          ${buildMapSVG()}
          <div class="map-hint">Click any highlighted state to explore its programmes</div>
        </div>
      </div>
      <div class="panel-col">
        <div class="panel" id="sidePanel">
          <div class="panel-empty">
            <div class="panel-empty-icon">🗺️</div>
            <div class="panel-empty-text">Select a state on the map to see its programmes.</div>
          </div>
        </div>
      </div>
    </div>
    <div class="intl-wrap">
      <div class="intl-toggle" id="intlToggle" onclick="toggleIntl()">
        <div class="intl-left">
          <span class="intl-icon">🌍</span>
          <div>
            <div class="intl-title">International deployments</div>
            <div class="intl-sub">${PROGRAMS.filter(p=>p.role==='international').length} programmes across Mozambique, Liberia, Senegal and Nigeria — click to expand</div>
          </div>
        </div>
        <span class="intl-chevron">▾</span>
      </div>
      <div class="intl-panel" id="intlPanel"></div>
    </div>
  `;
  renderStats();
  paintMap();
}

// ── STATS ─────────────────────────────────────────────────────────────────
function renderStats() {
  const india   = PROGRAMS.filter(p => p.role !== 'international');
  const live    = india.filter(p => p.stage === 'Live').length;
  const netNew  = PROGRAMS.filter(p => p.new).length;
  const partners= new Set(PROGRAMS.map(p=>p.by).filter(b=>b&&!b.includes('TBD')&&!b.includes('Global'))).size;
  const sectors = new Set(india.map(p=>p.sector)).size;
  const stats = [
    [india.length, 'India programmes'],
    [live,         'Live & in use'],
    [netNew,       'Net-new products by partners'],
    [partners+'+', 'Implementing organisations'],
    [sectors,      'Sectors covered'],
  ];
  document.getElementById('statRow').innerHTML = stats.map(([n,l]) =>
    `<div class="stat-card"><div class="stat-num">${n}</div><div class="stat-lbl">${l}</div></div>`
  ).join('');
}

// ── MAP PAINT ─────────────────────────────────────────────────────────────
function paintMap() {
  const svgStates = document.querySelectorAll('.map-state');
  svgStates.forEach(el => {
    const sid = el.dataset.sid;
    if (!sid || ['_nat','_intl','ar','mg','ne'].includes(sid)) return;
    let progs = stateMap[sid] || [];
    if (activeFilter !== 'all') progs = progs.filter(p => p.role === activeFilter);
    const hasProg = progs.length > 0;
    const role = hasProg ? dominantRole(progs) : null;
    const cfg  = role ? (ROLE[role] || ROLE.pipeline) : null;
    el.setAttribute('fill',   cfg ? cfg.fill   : '#e8e4de');
    el.setAttribute('stroke', cfg ? cfg.stroke : '#d6d3d1');
    el.style.opacity = (activeFilter !== 'all' && !hasProg) ? '0.25' : '1';
    el.classList.toggle('dimmed', activeFilter !== 'all' && !hasProg);
    // count badge — update via paired text element
    const badge = document.getElementById('badge-'+sid);
    if (badge) {
      if (hasProg && progs.length > 1) {
        badge.textContent = progs.length;
        badge.style.display = 'block';
      } else {
        badge.textContent = '';
        badge.style.display = 'none';
      }
    }
  });
  // re-highlight selected state
  if (activeState) {
    const sel = document.querySelector(`[data-sid="${activeState}"]`);
    if (sel) sel.classList.add('selected');
  }
}

// ── STATE CLICK ───────────────────────────────────────────────────────────
function clickState(sid) {
  if (activeState === sid) {
    activeState = null;
    document.querySelectorAll('.map-state').forEach(e => e.classList.remove('selected'));
    document.getElementById('sidePanel').innerHTML = `
      <div class="panel-empty">
        <div class="panel-empty-icon">🗺️</div>
        <div class="panel-empty-text">Select a state on the map to see its programmes.</div>
      </div>`;
    return;
  }
  activeState = sid;
  expandedCard = null;
  document.querySelectorAll('.map-state').forEach(e => e.classList.remove('selected'));
  const el = document.querySelector(`[data-sid="${sid}"]`);
  if (el) el.classList.add('selected');
  renderPanel(sid);
  if (window.innerWidth < 900) {
    setTimeout(() => document.getElementById('sidePanel').scrollIntoView({behavior:'smooth',block:'nearest'}), 80);
  }
}

function renderPanel(sid) {
  let progs = stateMap[sid] || [];
  if (activeFilter !== 'all') progs = progs.filter(p => p.role === activeFilter);
  const titleEl = document.querySelector(`[data-sid="${sid}"] title`);
  const stateName = titleEl ? titleEl.textContent : sid.toUpperCase();
  const live   = progs.filter(p=>p.stage==='Live').length;
  const design = progs.filter(p=>p.stage==='Design').length;

  if (!progs.length) {
    document.getElementById('sidePanel').innerHTML = `
      <div class="panel-state-name">${stateName}</div>
      <div class="panel-empty" style="min-height:220px;">
        <div class="panel-empty-text">No programmes${activeFilter!=='all'?' matching this filter':''} recorded for this state yet.</div>
      </div>`;
    return;
  }

  const cards = progs.map((p,i) => {
    const rc  = 'c-'+(p.role||'pipeline');
    const sc  = p.stage==='Live' ? 'pill-live' : 'pill-design';
    const pop = p.pop ? `<span class="prog-dm"><strong>People:</strong> ${(p.pop/1e6).toFixed(1)}M</span>` : '';
    const yr  = p.year ? `<span class="prog-dm"><strong>Since:</strong> ${p.year}</span>` : '';
    const nb  = p.new  ? `<span class="new-badge">Net-new</span>` : '';
    const byStr = (p.by && !p.by.includes('TBD') && !p.by.includes('Global')) ? p.by : '';
    return `
      <div class="prog-card ${rc}" onclick="toggleCard(${i})">
        <div class="prog-header">
          <div class="prog-use">${p.use}</div>
          <span class="prog-stage ${sc}">${p.stage}</span>
        </div>
        <div class="prog-meta">
          <span class="prog-sector">${p.sector}</span>
          ${byStr ? `<span>↳ ${byStr}</span>` : ''}
          ${nb}
        </div>
        <div class="prog-detail" id="pd-${i}">
          ${p.details}
          <div class="prog-detail-meta">${yr}${pop}</div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('sidePanel').innerHTML = `
    <div class="panel-state-name">${stateName}</div>
    <div class="panel-pills">
      ${live   ? `<span class="panel-pill pill-live">${live} live</span>` : ''}
      ${design ? `<span class="panel-pill pill-design">${design} in design</span>` : ''}
    </div>
    <div class="prog-list">${cards}</div>`;
}

function toggleCard(i) {
  const el = document.getElementById('pd-'+i);
  if (!el) return;
  const open = el.classList.contains('open');
  document.querySelectorAll('.prog-detail.open').forEach(d => d.classList.remove('open'));
  if (!open) el.classList.add('open');
}

// ── FILTER ────────────────────────────────────────────────────────────────
function applyFilter(role, btn) {
  activeFilter = role;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  paintMap();
  if (activeState) renderPanel(activeState);
}

// ── INTERNATIONAL ─────────────────────────────────────────────────────────
function toggleIntl() {
  const toggle = document.getElementById('intlToggle');
  const panel  = document.getElementById('intlPanel');
  toggle.classList.toggle('open');
  panel.classList.toggle('visible');
  if (panel.classList.contains('visible') && !panel.innerHTML.trim()) {
    const intl = PROGRAMS.filter(p => p.role === 'international');
    panel.innerHTML = `<div class="intl-grid">${intl.map(p =>
      `<div class="intl-card">
        <div class="intl-geo">${p.geo}</div>
        <div class="intl-use">${p.use}</div>
        <div class="intl-meta">${p.sector}${p.pop ? ' · '+(p.pop/1e6).toFixed(1)+'M people' : ''}</div>
      </div>`).join('')}</div>`;
  }
}

// ── BOOT ──────────────────────────────────────────────────────────────────
fetch(CSV_URL)
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  })
  .then(text => {
    init(parseCSV(text));
  })
  .catch(err => {
    document.getElementById('appRoot').innerHTML = `
      <div style="padding:3rem;text-align:center;color:#78716c;">
        <div style="font-size:1.5rem;margin-bottom:.5rem;">⚠️</div>
        <div style="font-size:.9rem;">Could not load programme data from GitHub.</div>
        <div style="font-size:.75rem;margin-top:.4rem;font-family:monospace;color:#a8a29e;">${err.message}</div>
        <div style="font-size:.8rem;margin-top:1rem;color:#a8a29e;">
          Make sure programmes.csv is in the root of the GitHub repo and the page is served over HTTPS.
        </div>
      </div>`;
  });
</script>
